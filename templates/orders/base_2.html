{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SIM Gizi RS{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- FONT -->
    <link href="https://fonts.cdnfonts.com/css/warren" rel="stylesheet">
    <!-- Alert -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Open Graph -->
    <meta property="og:title" content="SIM Gizi RS" />
    <meta property="og:image" content="{% static 'assets/images/simrs.png' %}">
    <meta property="og:image:width" content="1000" />
    <meta property="og:image:height" content="630" />

    <style>
        @import url('https://fonts.cdnfonts.com/css/warren');
       /* ===== WARNA DASAR ===== */
        :root {
            --rs-primary: #025c9f;      /* biru RS */
            --rs-primary-soft: #eaf4fb; /* biru sangat lembut */
            --rs-accent: #6fcf97;      /* hijau mint */
            --rs-text: #4a4a4a;
        }

        /* BODY */
        body {
            background-color: #f7f9fb;
            font-family: 'Warren', sans-serif;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e3edf5;
        }

        .sidebar-menu .list-group-item {
            border: none;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--rs-text);
            transition: all 0.25s ease;
        }

        .sidebar-menu .list-group-item i {
            font-size: 1.2rem;
            color: var(--rs-primary);
        }

        /* Hover */
        .sidebar-menu .list-group-item:hover {
            background-color: var(--rs-primary-soft);
            color: var(--rs-primary);
            padding-left: 26px;
        }

        /* Active */
        .sidebar-menu .list-group-item.active {
            background-color: var(--rs-primary);
            color: #fff;
            border-radius: 0 20px 20px 0;
        }

        .sidebar-menu .list-group-item.active i {
            color: #fff;
        }

        /* ===== TOP NAVBAR ===== */
        .navbar {
            background-color: var(--rs-primary) !important;
        }

        /* CARD TABEL RIWAYAT */
        .card-hover {
            transition: all 0.2s ease-in-out;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        
        /* LOADER */
        #page-loader {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body class="bg-light">
    <div id="page-loader">
        <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- TOP NAVBAR -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand mb-0 h5">
            <!-- <i class="bi bi-hospital"></i> SIM Gizi RS -->
            <a class="navbar-brand brand-logo-mini" href="{% url 'dashboard' %}">
                <img src="{% static 'assets/images/simrs.png' %}" alt="logo" style="width: 150px; height: auto; border-radius: 10px;" />
            </a>
        </span>

        <div class="dropdown">
            <button class="btn dropdown-toggle" data-bs-toggle="dropdown"
                style="background-color: #58b02b; color: white; font-weight: 200;">
                <i class="bi bi-person-circle"></i> {{ request.user.username }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- MAIN WRAPPER -->
    <div class="d-flex">

        <!-- SIDEBAR -->
        <div class="sidebar bg-white shadow-sm">
            <!-- <div class="sidebar-header text-center py-4">
                <h6 class="fw-bold text-primary mb-0">MENU UTAMA</h6>
            </div> -->

            <div class="list-group list-group-flush sidebar-menu">
                <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action"
                style="font-size: 20px;">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>

                <a href="{% url 'create_pesanan' %}" class="list-group-item list-group-item-action"
                style="font-size: 20px;">
                    <i class="bi bi-plus-circle"></i>
                    <span>Buat Pesanan</span>
                </a>

                <a href="{% url 'riwayat_pesanan' %}" class="list-group-item list-group-item-action"
                style="font-size: 20px;">
                    <i class="bi bi-clock-history"></i>
                    <span>Riwayat</span>
                </a>

                <a href="{% url 'favorit_pesanan' %}" class="list-group-item list-group-item-action"
                style="font-size: 20px;">
                    <i class="bi bi-star"></i>
                    <span>Favorit</span>
                </a>

                <a href="{% url 'master_bahan' %}" class="list-group-item list-group-item-action"
                style="font-size: 20px;">
                    <i class="bi bi-basket"></i>
                    <span>Master Bahan</span>
                </a>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const loader = document.getElementById("page-loader");

            // Hide loader saat halaman selesai load
            window.addEventListener("load", function () {
                if (loader) {
                    loader.style.opacity = "0";
                    setTimeout(() => loader.style.display = "none", 400);
                }
            });

            // Tampilkan loader saat pindah halaman
            document.querySelectorAll("a").forEach(function(link) {
                link.addEventListener("click", function() {

                    const href = link.getAttribute("href");

                    if (
                        href &&
                        !href.startsWith("#") &&
                        !href.startsWith("javascript:") &&
                        !link.hasAttribute("data-bs-toggle")
                    ) {
                        if (loader) {
                            loader.style.display = "flex";
                            loader.style.opacity = "1";
                        }
                    }

                });
            });

        });
        </script>
</body>
</html>
